spring:
  application:
    name: redis
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2s

app:
  redis-examples:
    pub-sub:
      enabled: false
      channel: learn:redis:channel:broadcast
